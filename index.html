<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Kitchen Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Kitchen Hub"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1a1916"/>
<link rel="apple-touch-icon" href="home-apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="home-icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="home-icon-512.png" />
<style>
:root {
  --bg:#f5f4f0; --surface:#fff; --border:#e0ddd6; --border-strong:#c8c4bb;
  --text:#1a1916; --text-muted:#7a776e; --text-hint:#b0ada5;
  --accent:#1a1916; --accent-fg:#fff;
  --success-bg:#edf7ed; --success-text:#2d6e2d; --success-border:#b2d9b2;
  --warn-bg:#fdf6e3; --warn-text:#8a6500; --warn-border:#f0d88a;
  --danger-bg:#fdecea; --danger-text:#c0392b; --danger-border:#f5b8b3;
  --radius:10px; --radius-sm:6px; --font:'Lexend',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}

.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.app-title{font-size:17px;font-weight:400;}
.app-title span{color:var(--text-muted);}
.header-date{font-size:11px;font-family:monospace;color:var(--text-muted);letter-spacing:.05em;margin-top:2px;}
.gear-btn{width:34px;height:34px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gear-btn:active{background:var(--border);}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:16px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px 14px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;min-height:156px;cursor:pointer;transition:border-color .12s,background .12s;}
.card:active{background:var(--bg);border-color:var(--border-strong);}
.card.dim{opacity:.45;}
.card-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;}
.card-name{font-size:14px;font-weight:500;margin-bottom:4px;}
.card-desc{font-size:12px;color:var(--text-muted);flex:1;line-height:1.5;}
.card-status{margin-top:10px;font-size:11px;font-family:monospace;min-height:16px;}
.ok{color:var(--success-text);}
.warn{color:var(--warn-text);}
.hint{color:var(--text-hint);}

#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-end;}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;}
.sheet-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sheet-head h2{font-size:16px;font-weight:500;}
.close-btn{font-size:26px;background:none;border:none;color:var(--text-muted);cursor:pointer;line-height:1;}
.sheet-body{padding:16px 20px 32px;}
.s-label{font-size:11px;font-family:monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.s-name-input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;}
.s-name-input::placeholder{color:var(--text-hint);}
.s-name-input:focus{border-color:var(--accent);}
.save-btn{width:100%;padding:13px;margin-top:16px;border-radius:var(--radius-sm);background:var(--accent);color:var(--accent-fg);border:none;font-size:15px;font-family:var(--font);cursor:pointer;}
.save-btn:active{opacity:.85;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-fg);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<header class="app-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="Logo.png" alt="Logo" style="height:32px;object-fit:contain;"/>
    <div>
      <div class="app-title" id="site-name">Kitchen <span>Hub</span></div>
      <div class="header-date" id="hdr-date"></div>
    </div>
  </div>
  <button class="gear-btn" id="gear-btn">⚙</button>
</header>

<div class="grid" id="grid"></div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-head">
      <h2>Site name</h2>
      <button class="close-btn" id="close-btn">×</button>
    </div>
    <div class="sheet-body">
      <div class="s-label">Display name</div>
      <input class="s-name-input" id="s-name" placeholder="e.g. Soho Kitchen"/>
      <button class="save-btn" id="save-btn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'dashboard_v1';

const TOOLS = [
  { id:'batch',      name:'Sauces Batch Record', icon:'🧾', bg:'#fdf3e0', desc:'Log production batches',
    url:'https://waiyandean.github.io/batching/',
    status(){ const r=ls('batch_records_v1'),n=r.filter(x=>x.date===today()).length; return n?{c:'ok',t:n+' batch'+(n!==1?'es':'')+' today'}:{c:'hint',t:'No batches today'}; } },
  { id:'deliveries', name:'Deliveries',      icon:'📦', bg:'#e3eff9', desc:'Record incoming deliveries',
    url:'https://waiyandean.github.io/deliveries/',
    status(){ const r=ls('delivery_records_v3'),n=r.filter(x=>x.date===today()).length; return n?{c:'ok',t:n+' deliver'+(n!==1?'ies':'y')+' today'}:{c:'hint',t:'No deliveries today'}; } },
  { id:'dispatch',   name:'Dispatch',        icon:'🚚', bg:'#ece5f5', desc:'Log outgoing orders',
    url:'https://waiyandean.github.io/dispatch/',
    status(){ const r=ls('dispatch_records_v1'),n=r.filter(x=>x.date===today()).length; return n?{c:'ok',t:n+' dispatch'+(n!==1?'es':'')+' today'}:{c:'hint',t:'No dispatches today'}; } },
  { id:'stockcheck', name:'Stock Check',     icon:'📊', bg:'#e5f2e5', desc:'Check and record stock levels',
    url:'https://waiyandean.github.io/stockcheck/',
    status(){ const r=ls('stock_checks_v1'); if(!r.length)return{c:'hint',t:'No checks recorded'}; const d=Math.floor((Date.now()-new Date(r[0].savedAt||r[0].date))/864e5); return d===0?{c:'ok',t:'Checked today'}:d<=7?{c:'hint',t:'Last checked '+d+'d ago'}:{c:'warn',t:'Not checked in '+d+' days'}; } },
  { id:'knife',      name:'Knife Registry',  icon:'🔪', bg:'#f5e5e5', desc:'Daily knife checks & register',
    url:'https://waiyandean.github.io/equipment/',
    status(){ const r=ls('knife_checks_v1'),t=today(),d=r.filter(c=>c.date===t),o=d.some(c=>c.checkType==='opening'),cl=d.some(c=>c.checkType==='closing'),i=d.some(c=>!c.allPresent||!c.allGoodCondition); if(o&&cl&&!i)return{c:'ok',t:'Both checks done ✓'}; if(o&&cl)return{c:'warn',t:'Done · issues logged'}; if(o)return{c:'warn',t:'Opening done · closing pending'}; return{c:'warn',t:'Opening check pending'}; } },
];

let cfg = { name: '' };

function today(){ return new Date().toISOString().slice(0,10); }
function ls(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function showToast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400); }

function loadCfg(){
  try{ const d=localStorage.getItem(SK); if(d) cfg=Object.assign(cfg,JSON.parse(d)); }catch(e){}
}

function renderHeader(){
  const n = cfg.name || 'Kitchen Hub';
  const words = n.split(' ');
  const last = words.pop();
  document.getElementById('site-name').innerHTML = (words.length?words.join(' ')+' ':'')+`<span>${last}</span>`;
  document.title = n;
  document.getElementById('hdr-date').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = TOOLS.map(t => {
    let st = '';
    try { const s=t.status(); if(s) st=`<span class="${s.c}">${s.c==='ok'?'✓ ':s.c==='warn'?'⚠ ':''}${s.t}</span>`; } catch(e){}
    const body = `
      <div class="card-icon" style="background:${t.bg}">${t.icon}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-status">${st}</div>`;
    return t.url
      ? `<a class="card" href="${t.url}">${body}</a>`
      : `<div class="card dim">${body}</div>`;
  }).join('');
}

function openModal(){
  document.getElementById('s-name').value = cfg.name || '';
  document.getElementById('modal').style.display = 'flex';
}
function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

document.getElementById('gear-btn').addEventListener('click', openModal);
document.getElementById('close-btn').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('save-btn').addEventListener('click', function(){
  cfg.name = document.getElementById('s-name').value.trim();
  localStorage.setItem(SK, JSON.stringify(cfg));
  closeModal();
  renderHeader();
  showToast('Saved ✓');
});
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) renderGrid(); });

loadCfg();
renderHeader();
renderGrid();
</script>
</body>
</html>
