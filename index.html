<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Kitchen Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Kitchen Hub"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1a1916"/>
<link rel="apple-touch-icon" href="home-apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="home-icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="home-icon-512.png" />
<style>
:root{
  --font:'Lexend',sans-serif;
  --radius:16px; --radius-sm:10px;
  --glass-bg:rgba(255,255,255,0.18);
  --glass-border:rgba(255,255,255,0.35);
  --glass-shadow:0 8px 32px rgba(0,0,0,0.18);
  --glass-blur:blur(18px) saturate(1.8);
  --text:#fff;
  --text-muted:rgba(255,255,255,0.7);
  --text-hint:rgba(255,255,255,0.45);
  --success-text:#a8f0a8;
  --warn-text:#ffe08a;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

body {
  font-family:var(--font);
  min-height:100vh;
  background: url('wallhaven-gwwywd.jpg') center/cover fixed no-repeat;
  color:var(--text);
}

/* Subtle dark overlay so text stays readable */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.28);
  z-index:0;
  pointer-events:none;
}

.app-header {
  position:relative; z-index:1;
  background:rgba(0,0,0,0.3);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border-bottom:1px solid rgba(255,255,255,0.15);
  padding:20px 20px 16px;
  display:flex; align-items:center; justify-content:space-between;
}
.site-name { font-size:22px; font-weight:300; line-height:1.2; color:#fff; }
.site-name b { font-weight:600; }
.header-date { font-size:11px; color:rgba(255,255,255,0.5); margin-top:3px; font-family:monospace; letter-spacing:.05em; }
.gear-btn {
  width:38px; height:38px; border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.25);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:#fff; font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.gear-btn:active { background:rgba(255,255,255,0.28); }

.grid {
  position:relative; z-index:1;
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:12px; padding:16px;
}

/* Liquid glass card */
.card {
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--glass-shadow);
  padding:16px 14px 14px;
  text-decoration:none;
  color:var(--text);
  display:flex; flex-direction:column;
  min-height:156px; cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  /* inner highlight at top edge for the glass look */
  position:relative; overflow:hidden;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
}
.card:active {
  transform:scale(0.97);
  background:rgba(255,255,255,0.26);
  box-shadow:0 4px 16px rgba(0,0,0,0.22);
}
.card.dim { opacity:.55; }

.card-icon {
  width:46px; height:46px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; margin-bottom:12px;
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
}
.card-name { font-size:14px; font-weight:500; margin-bottom:4px; color:#fff; }
.card-desc { font-size:12px; color:var(--text-muted); flex:1; line-height:1.5; }
.card-status { margin-top:10px; font-size:11px; font-family:monospace; min-height:16px; }
.ok   { color:var(--success-text); }
.warn { color:var(--warn-text); }
.hint { color:var(--text-hint); }

/* Modal */
#modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:100; align-items:flex-end; }
.sheet {
  background:rgba(30,28,25,0.75);
  backdrop-filter:blur(24px) saturate(1.6);
  -webkit-backdrop-filter:blur(24px) saturate(1.6);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px 20px 0 0;
  width:100%; max-height:88vh;
  display:flex; flex-direction:column;
}
.sheet-head {
  padding:16px 20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.sheet-head h2 { font-size:16px; font-weight:500; color:#fff; }
.close-btn { font-size:26px; background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; line-height:1; }
.sheet-body { padding:16px 20px; overflow-y:auto; flex:1; }
.s-label { font-size:11px; font-family:monospace; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:8px; }
.s-name-input {
  width:100%; padding:9px 11px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:var(--radius-sm);
  font-size:14px; font-family:var(--font);
  background:rgba(255,255,255,0.1);
  color:#fff; outline:none;
}
.s-name-input::placeholder { color:rgba(255,255,255,0.3); }
.s-name-input:focus { border-color:rgba(255,255,255,0.5); }
.save-btn {
  width:100%; padding:13px; margin-top:16px;
  border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff; font-size:15px; font-family:var(--font); cursor:pointer;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.save-btn:active { background:rgba(255,255,255,0.3); }

.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff; padding:10px 20px; border-radius:20px;
  font-size:13px; opacity:0; transition:opacity .25s;
  pointer-events:none; z-index:200; white-space:nowrap;
}
.toast.show { opacity:1; }
</style>
</head>
<body>

<header class="app-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="Logo.png" alt="Logo" style="height:32px;object-fit:contain;filter:brightness(0) invert(1);"/>
    <div>
      <div class="site-name" id="site-name"><b>Kitchen</b> Hub</div>
      <div class="header-date" id="hdr-date"></div>
    </div>
  </div>
  <button class="gear-btn" id="gear-btn">⚙</button>
</header>

<div class="grid" id="grid"></div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-head">
      <h2>Site name</h2>
      <button class="close-btn" id="close-btn">×</button>
    </div>
    <div class="sheet-body">
      <div class="s-label">Display name</div>
      <input class="s-name-input" id="s-name" placeholder="e.g. Soho Kitchen"/>
      <button class="save-btn" id="save-btn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'dashboard_v1';

const TOOLS = [
  { id:'batch',      name:'Batch Record',    icon:'🧾', desc:'Log production batches',
    url:'https://waiyandean.github.io/batching/',
    status(){ const r=ls('batch_records_v1'),n=r.filter(x=>x.date===today()).length; return n?{c:'ok',t:n+' batch'+(n!==1?'es':'')+' today'}:{c:'hint',t:'No batches today'}; } },
  { id:'templog',    name:'Temp Log',        icon:'🌡️', desc:'Cooking & cooling checks',
    url:'https://waiyandean.github.io/batching/temp-log.html',
    status(){ const r=ls('batch_records_v1'),cut=Date.now()-72*36e5,n=r.filter(x=>x.productCategory==='cooked'&&new Date(x.savedAt||x.date)>cut&&(x.cookTemp==null||x.coolTemp==null)).length; return n?{c:'warn',t:n+' check'+(n!==1?'s':'')+' pending'}:{c:'ok',t:'All temps logged'}; } },
  { id:'deliveries', name:'Deliveries',      icon:'📦', desc:'Record incoming deliveries',
    url:'https://waiyandean.github.io/deliveries/',
    status(){ const r=ls('delivery_records_v3'),n=r.filter(x=>x.date===today()).length; return n?{c:'ok',t:n+' deliver'+(n!==1?'ies':'y')+' today'}:{c:'hint',t:'No deliveries today'}; } },
  { id:'dispatch',   name:'Dispatch',        icon:'🚚', desc:'Log outgoing orders',
    url:'https://waiyandean.github.io/dispatch/',
    status(){ const r=ls('dispatch_records_v1'),n=r.filter(x=>x.date===today()).length; return n?{c:'ok',t:n+' dispatch'+(n!==1?'es':'')+' today'}:{c:'hint',t:'No dispatches today'}; } },
  { id:'stockcheck', name:'Stock Check',     icon:'📊', desc:'Check and record stock levels',
    url:'https://waiyandean.github.io/stockcheck/',
    status(){ const r=ls('stock_checks_v1'); if(!r.length)return{c:'hint',t:'No checks recorded'}; const d=Math.floor((Date.now()-new Date(r[0].savedAt||r[0].date))/864e5); return d===0?{c:'ok',t:'Checked today'}:d<=7?{c:'hint',t:'Last checked '+d+'d ago'}:{c:'warn',t:'Not checked in '+d+' days'}; } },
  { id:'knife',      name:'Knife Registry',  icon:'🔪', desc:'Daily knife checks & register',
    url:'https://waiyandean.github.io/equipment/',
    status(){ const r=ls('knife_checks_v1'),t=today(),d=r.filter(c=>c.date===t),o=d.some(c=>c.checkType==='opening'),cl=d.some(c=>c.checkType==='closing'),i=d.some(c=>!c.allPresent||!c.allGoodCondition); if(o&&cl&&!i)return{c:'ok',t:'Both checks done ✓'}; if(o&&cl)return{c:'warn',t:'Done · issues logged'}; if(o)return{c:'warn',t:'Opening done · closing pending'}; return{c:'warn',t:'Opening check pending'}; } },
  { id:'plasters',   name:'Plaster Log',     icon:'🩹', desc:'Issue and track plasters',
    url:'',
    status(){ const r=ls('knife_plasters_v1'),out=r.filter(p=>p.continueWorking&&!p.accounted).length; if(out)return{c:'warn',t:out+' plaster'+(out!==1?'s':'')+' outstanding'}; const n=r.filter(p=>p.date===today()).length; return n?{c:'ok',t:'All accounted for'}:{c:'hint',t:'No issues today'}; } },
];

let cfg = { name: '' };

function today(){ return new Date().toISOString().slice(0,10); }
function ls(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function showToast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2400); }

function loadCfg(){
  try{ const d=localStorage.getItem(SK); if(d) cfg=Object.assign(cfg,JSON.parse(d)); }catch(e){}
}

function renderHeader(){
  const n = cfg.name || 'Kitchen Hub';
  const words = n.split(' ');
  const last = words.pop();
  document.getElementById('site-name').innerHTML = (words.length?words.join(' ')+' ':'')+`<b>${last}</b>`;
  document.title = n;
  document.getElementById('hdr-date').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
}

function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = TOOLS.map(t => {
    let st = '';
    try { const s=t.status(); if(s) st=`<span class="${s.c}">${s.c==='ok'?'✓ ':s.c==='warn'?'⚠ ':''}${s.t}</span>`; } catch(e){}
    const body = `
      <div class="card-icon">${t.icon}</div>
      <div class="card-name">${t.name}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-status">${st}</div>`;
    return t.url
      ? `<a class="card" href="${t.url}">${body}</a>`
      : `<div class="card dim">${body}</div>`;
  }).join('');
}

function openModal(){
  document.getElementById('s-name').value = cfg.name || '';
  document.getElementById('modal').style.display = 'flex';
}
function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

document.getElementById('gear-btn').addEventListener('click', openModal);
document.getElementById('close-btn').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('save-btn').addEventListener('click', function(){
  cfg.name = document.getElementById('s-name').value.trim();
  localStorage.setItem(SK, JSON.stringify(cfg));
  closeModal();
  renderHeader();
  showToast('Saved ✓');
});
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) renderGrid(); });

loadCfg();
renderHeader();
renderGrid();
</script>
</body>
</html>
